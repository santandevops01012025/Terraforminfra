name: firstworkflow
on: 
  workflow_dispatch: 
permissions: 
  id-token: write
  contents: read
jobs:
  terraform_install:
    runs-on: ubuntu-latest
    steps:
      - name: code-checput
        uses: actions/checkout@v6.0.3

      - name: Terraform install
        uses: hashicorp/setup-terraform@v2.0.3
        

      - name: Terraform-init
        run: terraform init
    
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}  

      - name: Terraform-Plan
        run: terraform plan
        
        
        
    
